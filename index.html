<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis AI Assistant</title>
<style>
  body { margin:0; font-family: monospace; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color:#0ff; }
  
  /* Center circle AI assistant */
  #jarvisCircle {
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, #0ff 0%, #00aaff 80%);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 30px #0ff, 0 0 60px #00aaff;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  #jarvisCircle:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px #0ff, 0 0 80px #00aaff;
  }

  #jarvisCircle img {
    width: 80px;
    height: 80px;
  }

  #jarvisStatus {
    position: absolute;
    bottom: 50px;
    color:#0ff;
    font-size: 16px;
  }

  #jarvisChat {
    position: absolute;
    bottom: 100px;
    width: 300px;
    max-height: 300px;
    background: rgba(0,0,0,0.9);
    border-radius: 15px;
    padding: 10px;
    overflow-y: auto;
    display: none;
  }

  #jarvisChat b { color:#0ff; }
</style>
</head>
<body>

<div id="jarvisCircle">
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712031.png" alt="Jarvis Robot">
</div>

<div id="jarvisStatus">Say "Jarvis" to activate</div>
<div id="jarvisChat"></div>

<script>
const circle = document.getElementById("jarvisCircle");
const status = document.getElementById("jarvisStatus");
const chatBox = document.getElementById("jarvisChat");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SpeechRecognition){
  status.innerText = "Your browser does not support Speech Recognition!";
}

let recognition;
let listening = false;
let commandMode = false;

// Start speech recognition
function startRecognition(){
  recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.start();
  listening = true;
  chatBox.style.display = "block";
  status.innerText = 'Listening for "Jarvis"...';

  recognition.onresult = async (event) => {
    const transcript = Array.from(event.results)
      .map(r => r[0].transcript)
      .join("")
      .toLowerCase();

    console.log("Transcript:", transcript);

    if(!commandMode && transcript.includes("jarvis")){
      addMessage("System", "Wake word detected! Listening...");
      commandMode = true;
      status.innerText = "Jarvis Activated! Speak your command...";
      speak("Yes, I am listening!");
    } else if(commandMode){
      if(transcript.includes("stop")){
        addMessage("System", "Jarvis stopped.");
        status.innerText = 'Say "Jarvis" to activate again';
        commandMode = false;
        recognition.stop();
      } else {
        addMessage("You", transcript);
        const response = await getJarvisResponse(transcript);
        addMessage("Jarvis", response);
        speak(response);
      }
    }
  };

  recognition.onerror = (e) => {
    console.log("Error:", e.error);
    recognition.stop();
    listening = false;
    status.innerText = 'Say "Jarvis" to activate again';
  };

  recognition.onend = () => {
    listening = false;
    if(commandMode){
      startRecognition(); // restart to continue listening
    }
  };
}

// Chat box display
function addMessage(sender, text){
  const div = document.createElement("div");
  div.style.marginBottom = "8px";
  div.innerHTML = `<b>${sender}:</b> ${text}`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Text-to-speech
function speak(text){
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";
  speechSynthesis.speak(utterance);
}

// Dummy AI response
async function getJarvisResponse(text){
  return `You said: "${text}". Jarvis is responding!`;
}

// Click circle once to grant mic permission and start listening
circle.addEventListener("click", () => {
  if(!listening) startRecognition();
  status.innerText = 'Listening... Say "Jarvis" to activate';
});
</script>

</body>
</html>
